<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Friends API</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f9f9f9;
        }

        h1 {
            margin-top: 20px;
        }

        .box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            width: 420px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        input {
            margin: 5px;
            padding: 8px;
            width: 80%;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        table {
            margin: 0 auto;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Friends Module</h1>

    <a href="/">Back to Home</a>

    <div class="box">
        <h2>GET</h2>

        <form action="/friends/by-user" method="get">
            <input name="userID" placeholder="User ID">
            <button type="submit">Get Friends By User</button>
        </form>

        <form action="/friends/requests" method="get">
            <input name="userID" placeholder="User ID">
            <button type="submit">Get Friend Requests</button>
        </form>

        <form action="/friends/accepted" method="get">
            <input name="userID" placeholder="User ID">
            <button type="submit">Get Accepted Friends</button>
        </form>
    </div>

    <div class="box">
        <h2>SEND REQUEST</h2>

        <form action="/friends/send-request" method="post">
            <input name="user1ID" placeholder="From User ID"><br>
            <input name="user2ID" placeholder="To User ID"><br>
            <button type="submit">Send Request</button>
        </form>
    </div>

    <div class="box">
        <h2>All Friend Records</h2>

        <table border="1">
            <tr>
                <th>Friendship ID</th>
                <th>User 1</th>
                <th>User 2</th>
                <th>Status</th>
            </tr>

            <tr th:each="f : ${data}">
                <td th:text="${f.friendshipID}"></td>
                <td th:text="${f.user1 != null ? f.user1.userID : ''}"></td>
                <td th:text="${f.user2 != null ? f.user2.userID : ''}"></td>
                <td th:text="${f.status}"></td>
            </tr>
        </table>
    </div>

</body>

</html>
