<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Posts</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 60%;
            margin: auto;
        }

        .post {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .post h4 {
            margin: 0;
            color: #333;
        }

        .post p {
            margin: 10px 0;
        }

        .post small {
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>User Posts</h2>

    <div th:each="post : ${posts}" class="post">
        <h4 th:text="'Post ID: ' + ${post.postId}"></h4>
        <p th:text="${post.content}"></p>
        <small th:text="${post.createdAt}"></small>
    </div>

</div>

</body>
</html>
