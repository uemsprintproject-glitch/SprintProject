<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Notifications API</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f9f9f9;
        }

        h1 {
            margin-top: 20px;
        }

        .box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        input {
            margin: 5px;
            padding: 8px;
            width: 80%;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Notifications Module</h1>

    <a href="/">Back to Home</a>

    <div class="box">
        <h2>GET</h2>

        <a href="/member/notifications/all">
            <button>Get All Notifications</button>
        </a>

        <form action="/member/notifications/by-id" method="get">
            <input name="id" placeholder="Notification ID">
            <button type="submit">Get Notification By ID</button>
        </form>

        <form action="/member/notifications/by-user" method="get">
            <input name="userID" placeholder="User ID">
            <button type="submit">Get Notifications By User</button>
        </form>
    </div>

    <div class="box">
        <h2>CREATE NOTIFICATION</h2>

        <form action="/member/notifications/create" method="post">
            <input name="notificationID" placeholder="Notification ID"><br>
            <input name="content" placeholder="Content"><br>
            <input name="userID" placeholder="User ID"><br>
            <button type="submit">Create Notification</button>
        </form>
    </div>

    <div class="box">
        <h2>UPDATE NOTIFICATION</h2>

        <form action="/member/notifications/update" method="post">
            <input name="notificationID" placeholder="Notification ID"><br>
            <input name="content" placeholder="Content"><br>
            <input name="userID" placeholder="User ID"><br>
            <button type="submit">Update Notification</button>
        </form>
    </div>

    <div class="box">
        <h2>DELETE NOTIFICATION</h2>

        <form action="/member/notifications/delete" method="post">
            <input name="id" placeholder="Notification ID">
            <button type="submit">Delete Notification</button>
        </form>
    </div>

</body>

</html>
