<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Social Media Platform</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 15px;
            width: 180px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            cursor: pointer;
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

<h1>🚀 Social Media Platform</h1>
<h3>Select a Team Member</h3>

<div class="container">

    <!-- Anishka -->
    <a href="/member/users">
        <div class="card">
            <img src="https://via.placeholder.com/100">
            <h3>Anishka Das</h3>
            <p>Users Module</p>
        </div>
    </a>

    <!-- Poulami -->
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Poulami Sinha</h3>
        <p>Posts Module</p>
    </div>

    <!-- Soumyajit -->
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Soumyajit Sen Gupta</h3>
        <p>Comments</p>
    </div>

    <!-- Sagnik -->
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Sagnik Dutta</h3>
        <p>Likes</p>
    </div>

    <a href="/members/messages">
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Ashmit Dutta</h3>
        <p>Friends</p>
    </div>
    </a>

    <!-- Anshi -->
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Anshi Prajapati</h3>
        <p>Messages</p>
    </div>

</div>

</body>
</html>
