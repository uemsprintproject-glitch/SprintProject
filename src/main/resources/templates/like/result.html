<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Like Results</title>
</head>

<body>

    <h2>Like Data</h2>

    <table border="1">
        <tr>
            <th>Like ID</th>
            <th>User ID</th>
            <th>Post ID</th>
            <th>Timestamp</th>
        </tr>

        <tr th:each="like : ${data}">
            <td th:text="${like.likeID}"></td>
            <td th:text="${like.user != null ? like.user.userID : ''}"></td>
            <td th:text="${like.post != null ? like.post.postID : ''}"></td>
            <td th:text="${like.timestamp}"></td>
        </tr>
    </table>

</body>

</html>
