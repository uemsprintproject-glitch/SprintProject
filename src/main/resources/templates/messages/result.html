<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Message Results</title>
</head>
<body>

<h2>Message Data</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Text</th>
        <th>Timestamp</th>
    </tr>

    <tr th:each="msg : ${data}">
        <td th:text="${msg.messageID}"></td>
        <td th:text="${msg.sender.userID}"></td>
        <td th:text="${msg.receiver.userID}"></td>
        <td th:text="${msg.message_text}"></td>
        <td th:text="${msg.timestamp}"></td>
    </tr>
</table>

</body>
</html>
