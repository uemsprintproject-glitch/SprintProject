<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Posts API UI</title>

    <style>
        body { font-family: Arial; text-align: center; }
        .box {
            border: 1px solid #aaa;
            padding: 20px;
            margin: 20px auto;
            width: 320px;
            border-radius: 10px;
        }
        input, textarea {
            margin: 5px;
            padding: 6px;
            width: 90%;
        }
        button {
            margin-top: 10px;
            padding: 6px 10px;
        }
    </style>
</head>

<body>

<h2>Posts APIs</h2>

<div class="box">
    <h3>GET</h3>

    <form action="/members/posts/all" method="get">
        <button type="submit">Get All Posts</button>
    </form>

    <form action="/members/posts/by-user" method="get">
        <input type="number" name="userId" placeholder="User ID"/>
        <button type="submit">Get Posts By User</button>
    </form>
</div>

<div class="box">
    <h3>POST</h3>

    <form action="/members/posts/create" method="post">
        <input type="number" name="userId" placeholder="User ID"/>
        <textarea name="content" placeholder="Write your post..."></textarea>
        <button type="submit">Create Post</button>
    </form>
</div>

<div class="box">
    <h3>DELETE</h3>

    <form action="/members/posts/delete" method="post">
        <input type="number" name="id" placeholder="Post ID"/>
        <button type="submit">Delete Post</button>
    </form>
</div>

</body>
</html>
