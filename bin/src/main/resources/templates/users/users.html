<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users API</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f9f9f9;
        }

        h1 {
            margin-top: 20px;
        }

        .box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        input {
            margin: 5px;
            padding: 8px;
            width: 80%;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>👩‍💻 Anishka Das - Users Module</h1>

<a href="/">⬅ Back to Home</a>

<!-- GET -->
<div class="box">
    <h2>GET</h2>

    <a href="/member/users/all">
        <button>Get All Users</button>
    </a>

    <form action="/member/users/by-id">
        <input name="id" placeholder="Enter User ID">
        <button type="submit">Get User By ID</button>
    </form>
</div>

<!-- POST -->
<div class="box">
    <h2>CREATE USER</h2>

    <form action="/member/users/create" method="post">
        <input name="username" placeholder="Username"><br>
        <input name="email" placeholder="Email"><br>
        <input name="password" placeholder="Password"><br>
        <input name="profile_picture" placeholder="Profile Picture"><br>

        <button type="submit">Create User</button>
    </form>
</div>

<!-- UPDATE -->
<div class="box">
    <h2>UPDATE USER</h2>

    <form action="/member/users/update" method="post">
        <input name="userid" placeholder="User ID"><br>
        <input name="username" placeholder="Username"><br>
        <input name="email" placeholder="Email"><br>
        <input name="password" placeholder="Password"><br>

        <button type="submit">Update</button>
    </form>
</div>

<!-- DELETE -->
<div class="box">
    <h2>DELETE USER</h2>

    <form action="/member/users/delete" method="post">
        <input name="id" placeholder="User ID">
        <button type="submit">Delete</button>
    </form>
</div>

<div class="box">
    <h2>GET USER POSTS</h2>

    <form action="/member/users/posts" method="get">
        <input name="id" placeholder="User ID"><br>
        <button type="submit">Get Posts</button>
    </form>
</div>

</body>
</html>
